<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Login | Odyssey</title>
    <!-- Google Fonts -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;500;600;700;800&display=swap" rel="stylesheet">
    <!-- Boxicons -->
    <link href='https://unpkg.com/boxicons@2.1.4/css/boxicons.min.css' rel='stylesheet'>
    <link rel="stylesheet" href="style.css">
</head>
<body>

    <section class="auth-section">
        <div class="auth-card">
            <div style="text-align: center; margin-bottom: 2.5rem;">
                <a href="index.html" class="brand-logo" style="justify-content: center; margin-bottom: 1rem;">
                    <i class='bx bx-compass'></i>
                    <span>Odyssey</span>
                </a>
                <h2 style="font-size: 1.5rem;">Welcome Back</h2>
                <p style="color: var(--text-muted); font-size: 0.9rem;">Enter your credentials to access your journey.</p>
            </div>

            <form id="login-form">
                <div class="form-group">
                    <label>Email Address</label>
                    <input type="email" id="login-email" class="form-control" placeholder="name@example.com" required>
                </div>
                <div class="form-group">
                    <label>Password</label>
                    <input type="password" id="login-password" class="form-control" placeholder="••••••••" required>
                </div>
                <button type="submit" class="btn btn-solid" style="width: 100%; justify-content: center; margin-top: 1rem;">Login</button>
            </form>

            <div style="text-align: center; margin-top: 2rem; font-size: 0.9rem;">
                <p style="color: var(--text-muted);">New to the Odyssey? <a href="register.html" style="color: var(--primary); font-weight: 700;">Create Account</a></p>
                <p style="margin-top: 1rem; font-size: 0.75rem; color: #4b5563;">Admin Access: admin@odyssey.com / admin123</p>
            </div>
        </div>
    </section>

    <script src="script.js"></script>
</body>
</html>
